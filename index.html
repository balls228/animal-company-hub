<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My App</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ================= LOGIN ================= -->
<div id="login">
    <h2>Login</h2>

    <input id="username" placeholder="Username">
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
    <button onclick="register()">Register</button>
    <button onclick="guestLogin()">Continue as Guest</button>
</div>

<!-- ================= SIDEBAR ================= -->
<div id="sidebar" style="display:none;">
    <button onclick="goHome()">🏠 Home</button>
    <button onclick="goAssets()">📦 Assets</button>
    <button onclick="toggleProfile()">👤 Profile</button>
    <button onclick="logout()">🚪 Logout</button>
</div>

<!-- ================= CONTENT ================= -->
<div id="content" style="display:none;">

    <div id="home">
        <h1>Home</h1>
    </div>

    <div id="assets" style="display:none;">
        <h1>Assets</h1>
    </div>

</div>

<!-- ================= PROFILE ================= -->
<div id="profilePanel" style="display:none;">
    <h2 id="profileNick">Guest</h2>
    <p id="profileRole">guest</p>

    <textarea id="bioInput" placeholder="Your bio"></textarea>
</div>

<!-- ================= SUPABASE SCRIPT ================= -->
<script type="module" src="supabase.js"></script>

<!-- ================= MAIN SCRIPT ================= -->
<script type="module" src="script.js"></script>

</body>
</html>
