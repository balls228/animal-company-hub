<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>App</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- TOP BAR -->
<div id="topbar">
  <div class="nav">
    <button onclick="goHome()">Home</button>
    <button onclick="goAssets()">Assets</button>
  </div>

  <div id="avatarBtn" onclick="toggleProfile()"></div>
</div>

<!-- HOME -->
<div id="home">
  <h1 id="nick">User</h1>
</div>

<!-- ASSETS -->
<div id="assets" style="display:none;">
  <h2>Assets page</h2>
</div>

<!-- PROFILE PANEL -->
<div id="profilePanel" style="display:none;">
  <div class="avatarBig" id="profileAvatar"></div>

  <input id="bioInput" placeholder="bio">

  <button onclick="saveProfile()">Save</button>
</div>

<script type="module" src="script.js"></script>

</body>
</html>
