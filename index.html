<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Site</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="login">
    <h2>Login</h2>

    <input id="username" placeholder="Username">
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
    <button onclick="register()">Register</button>
    <button onclick="guestLogin()">Continue as Guest</button>
</div>

<div id="sidebar" style="display:none;">
    <button onclick="goHome()">🏠 Home</button>
    <button onclick="goAssets()">📦 Assets</button>
    <button onclick="toggleProfile()">👤 Profile</button>
    <button onclick="logout()">🚪 Logout</button>
</div>

<div id="content" style="display:none;">
    <div id="home">
        <h1>Home</h1>
    </div>

    <div id="assets" style="display:none;">
        <h1>Assets</h1>
    </div>
</div>

<div id="profilePanel" style="display:none;">
    <h2 id="profileNick">Guest</h2>
    <p id="profileRole">guest</p>

    <textarea id="bioInput" placeholder="Your bio"></textarea>
</div>

<script>
function login() {
    document.getElementById("login").style.display = "none";
    document.getElementById("sidebar").style.display = "block";
    document.getElementById("content").style.display = "block";
}

function register() {
    alert("Register clicked");
}

function guestLogin() {
    login();
}

function goHome() {
    document.getElementById("home").style.display = "block";
    document.getElementById("assets").style.display = "none";
}

function goAssets() {
    document.getElementById("home").style.display = "none";
    document.getElementById("assets").style.display = "block";
}

function toggleProfile() {
    const panel = document.getElementById("profilePanel");

    if (panel.style.display === "none" || panel.style.display === "") {
        panel.style.display = "block";
    } else {
        panel.style.display = "none";
    }
}

function logout() {
    location.reload();
}
</script>

</body>
</html>
